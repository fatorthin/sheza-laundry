version: '3.8'
services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    image: sheza-laundry
    container_name: sheza-laundry-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - laravel
      - coolify

  # Queue Worker (sends WhatsApp notifications asynchronously)
  queue:
    image: sheza-laundry
    container_name: sheza-laundry-queue
    restart: unless-stopped
    working_dir: /var/www
    network_mode: host
    volumes:
      - ./:/var/www
    depends_on:
      - app
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=60

  # Nginx Service
  web:
    image: nginx:alpine
    container_name: laravel-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: laravel-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user_laravel
      MYSQL_PASSWORD: user_password
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel

networks:
  laravel:
    driver: bridge
  coolify:
    external: true

volumes:
  dbdata:
    driver: local
