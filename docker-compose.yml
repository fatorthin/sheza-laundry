version: '3.8'
services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    image: sheza-laundry
    container_name: sheza-laundry-app
    restart: unless-stopped
    working_dir: /var/www
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./:/var/www
    networks:
      - laravel

  # Nginx Service
  web:
    image: nginx:alpine
    container_name: laravel-web
    restart: unless-stopped
    ports:
      - "8080:80"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: laravel-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user_laravel
      MYSQL_PASSWORD: user_password
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  dbdata:
    driver: local
